eval_rpn:
  evals:
    ReturnType:
      type: int
  dataset:
    # Typical/Happy Path Cases
    - case:
        id: simple_addition
        input: ["1", "2", "+"]
        expected: 3
    - case:
        id: simple_subtraction
        input: ["10", "3", "-"]
        expected: 7
    - case:
        id: simple_multiplication
        input: ["4", "5", "*"]
        expected: 20
    - case:
        id: simple_positive_division
        input: ["10", "2", "/"]
        expected: 5
    - case:
        id: truncate_positive
        input: ["7", "2", "/"]
        expected: 3
    - case:
        id: truncate_negative
        input: ["-7", "2", "/"]
        expected: -3
    - case:
        id: complex_expression_1
        input: ["17", "10", "4", "*", "+"]
        expected: 57
    - case:
        id: complex_expression_2
        input: ["2", "1", "+", "3", "*"]
        expected: 9
    - case:
        id: zero_add_identity
        input: ["4", "0", "+"]
        expected: 4
    - case:
        id: one_multiply_identity
        input: ["4", "1", "*"]
        expected: 4
    - case:
        id: zero_numerator_division
        input: ["0", "5", "/"]
        expected: 0
    - case:
        id: large_numbers_multiply
        input: ["1000000", "2", "*"]
        expected: 2000000
    - case:
        id: negative_addition
        input: ["-5", "-2", "+"]
        expected: -7
    - case:
        id: negative_multiplication
        input: ["-10", "2", "*"]
        expected: -20
    - case:
        id: nested_operations
        input: ["10", "2", "3", "*", "4", "-", "+"]
        expected: 12
    - case:
        id: single_token
        input: ["1"]
        expected: 1

    # Error Cases
    - case:
        id: empty_list_error
        input: []
        raises: ValueError
        match: "Empty expression"
    - case:
        id: too_many_values_on_stack
        input: ["1", "2"]
        raises: ValueError
        match: "Invalid expression: 2 values remaining on stack"
    - case:
        id: not_enough_operands
        input: ["+"]
        raises: ValueError
        match: "Not enough operands for '\\+'"
    - case:
        id: division_by_zero
        input: ["5", "0", "/"]
        raises: ZeroDivisionError
        match: "Division by zero"
    - case:
        id: invalid_token_chars
        input: ["5", "invalid"]
        raises: ValueError
        match: "Invalid token: 'invalid'"
    - case:
        id: invalid_type_input
        input: null
        raises: ValueError
        match: "Empty expression"
