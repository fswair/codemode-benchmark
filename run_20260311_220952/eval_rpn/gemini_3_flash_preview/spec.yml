eval_rpn:
  evals:
    ReturnsInteger:
      type: "int"
    NonEmptyOutput:
      assertion: "isinstance(output, int)"
  dataset:
    - case:
        id: "basic_addition_multiplication"
        input: ["2", "1", "+", "3", "*"]
        expected: 9
    - case:
        id: "expression_with_truncation"
        input: ["4", "13", "5", "/", "+"]
        expected: 6
    - case:
        id: "complex_multi_step"
        input: ["10", "6", "9", "3", "+", "-11", "*", "/", "*", "17", "+", "5", "+"]
        expected: 22
    - case:
        id: "single_operand"
        input: ["42"]
        expected: 42
    - case:
        id: "division_truncation_positive"
        input: ["10", "3", "/"]
        expected: 3
    - case:
        id: "division_truncation_negative"
        input: ["-10", "3", "/"]
        expected: -3
    - case:
        id: "division_truncation_negative_divisor"
        input: ["10", "-3", "/"]
        expected: -3
    - case:
        id: "zero_divided_by_number"
        input: ["0", "5", "/"]
        expected: 0
    - case:
        id: "multiplication_two_negatives"
        input: ["-5", "-2", "*"]
        expected: 10
    - case:
        id: "subtraction_result_negative"
        input: ["1", "2", "-"]
        expected: -1
    - case:
        id: "large_integer_multiplication"
        input: ["1000000", "1000000", "*"]
        expected: 1000000000000
    - case:
        id: "negative_single_operand"
        input: ["-12345"]
        expected: -12345
    - case:
        id: "result_is_zero"
        input: ["5", "5", "+", "10", "-"]
        expected: 0
    - case:
        id: "chain_of_operations"
        input: ["10", "2", "/", "5", "*"]
        expected: 25
    - case:
        id: "nested_operations"
        input: ["2", "3", "+", "4", "5", "+", "*"]
        expected: 45
    - case:
        id: "error_empty_expression"
        input: []
        raises: "ValueError"
        match: "Empty expression"
    - case:
        id: "error_not_enough_operands"
        input: ["1", "+"]
        raises: "ValueError"
        match: "Not enough operands for '\\+'"
    - case:
        id: "error_division_by_zero"
        input: ["1", "0", "/"]
        raises: "ZeroDivisionError"
        match: "Division by zero"
    - case:
        id: "error_invalid_token"
        input: ["1", "abc"]
        raises: "ValueError"
        match: "Invalid token: 'abc'"
    - case:
        id: "error_too_many_remaining"
        input: ["1", "2", "3", "+"]
        raises: "ValueError"
        match: "Invalid expression: 2 values remaining on stack"
    - case:
        id: "error_operator_only"
        input: ["+"]
        raises: "ValueError"
        match: "Not enough operands for '\\+'"
