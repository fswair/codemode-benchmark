flatten:
  evals:
    IsList:
      type: list
    Flattened:
      assertion: all(not isinstance(x, list) for x in output)
  dataset:
  - case:
      id: simple_flat
      input:
      - 1
      - 2
      - 3
      expected:
      - 1
      - 2
      - 3
  - case:
      id: one_level_nesting
      input:
      - - 1
        - 2
      - - 3
        - 4
      expected:
      - 1
      - 2
      - 3
      - 4
  - case:
      id: deeply_nested
      input:
      - 1
      - - 2
        - - 3
          - - 4
      expected:
      - 1
      - 2
      - 3
      - 4
