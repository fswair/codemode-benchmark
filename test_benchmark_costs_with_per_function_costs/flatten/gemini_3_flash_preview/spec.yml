        - - c
      expected:
      - a
      - b
      - c
  - case:
      id: heterogeneous_types
      input:
      - 1
      - mixed
      - - 2.5
        - true
      - null
      expected:
      - 1
      - mixed
      - 2.5
      - true
      - null
