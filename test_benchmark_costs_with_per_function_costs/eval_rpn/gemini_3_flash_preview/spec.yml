eval_rpn:
  evals:
    ReturnType:
      type: "int"
    NonEmpty:
      assertion: "isinstance(output, int)"
  dataset:
    # Basic compound expressions
    - case:
        id: "basic_addition_multiplication"
        input: ["2", "1", "+", "3", "*"]
        expected: 9
    - case:
        id: "basic_division_addition"
        input: ["4", "13", "5", "/", "+"]
        expected: 6

    # Complex expression
    - case:
        id: "complex_multi_op"
        input: ["10", "6", "9", "3", "+", "-11", "*", "/", "*", "17", "+", "5", "+"]
        expected: 22

    # Single operand / identity
    - case:
        id: "single_operand"
        input: ["42"]
        expected: 42
    - case:
        id: "negative_operand_identity"
        input: ["-1024"]
        expected: -1024

    # Negative numbers
    - case:
        id: "negative_operand_product"
        input: ["-5", "2", "*"]
        expected: -10
    - case:
        id: "double_negative_product"
        input: ["-7", "-3", "*"]
        expected: 21

    # Division Truncation (Ground Truth)
    - case:
        id: "truncation_positive"
        input: ["10", "3", "/"]
        expected: 3
    - case:
        id: "truncation_negative_num"
        input: ["-10", "3", "/"]
        expected: -3
    - case:
        id: "truncation_negative_den"
        input: ["10", "-3", "/"]
        expected: -3
    - case:
        id: "truncation_both_negative"
        input: ["-10", "-3", "/"]
        expected: 3
    - case:
        id: "truncation_float_like"
        input: ["5", "-2", "/"]
        expected: -2

    # Zero results and zero numerators
    - case:
        id: "zero_numerator"
        input: ["0", "5", "/"]
        expected: 0
    - case:
        id: "result_zero_sum"
        input: ["-1", "1", "+"]
        expected: 0
    - case:
        id: "result_zero_mul"
        input: ["5", "5", "-", "0", "*"]
        expected: 0
    - case:
        id: "result_zero_sub"
        input: ["7", "8", "+", "15", "-"]
        expected: 0

    # Large Numbers
    - case:
        id: "large_product"
        input: ["1000000", "1000000", "*"]
        expected: 1000000000000
    - case:
        id: "large_negative"
        input: ["-1", "2000000", "*"]
        expected: -2000000

    # Operation order (Non-commutative)
    - case:
        id: "subtraction_order"
        input: ["10", "5", "-", "3", "-"]
        expected: 2
    - case:
        id: "division_order"
        input: ["12", "3", "/", "2", "/"]
        expected: 2
    - case:
        id: "deep_stack_subtraction"
        input: ["2", "3", "4", "*", "-", "5", "+"]
        expected: -5

    # Structure variants
    - case:
        id: "symmetric_groups"
        input: ["1", "2", "+", "3", "4", "+", "*"]
        expected: 21
    - case:
        id: "negative_first_sum"
        input: ["-3", "40", "+"]
        expected: 37
    - case:
        id: "linear_accumulation"
        input: ["1", "2", "+", "3", "+", "4", "+", "5", "+"]
        expected: 15
    - case:
        id: "truncation_intermediate"
        input: ["100", "33", "/", "3", "*"]
        expected: 9
    - case:
        id: "multiple_identical_collapse"
        input: ["1", "1", "1", "1", "1", "+", "+", "+", "+"]
        expected: 5

    # 11 RAISED cases (as per Verified Error Results)
    - case:
        id: "error_empty_expression"
        input: []
        raises: ValueError
        match: "Empty expression"
    - case:
        id: "error_not_enough_operands"
        input: ["10", "+"]
        raises: ValueError
        match: "Not enough operands for '\\+'"
    - case:
        id: "error_division_by_zero"
        input: ["10", "0", "/"]
        raises: ZeroDivisionError
        match: "Division by zero"
    - case:
        id: "error_invalid_token_abc"
        input: ["10", "abc", "+"]
        raises: ValueError
        match: "Invalid token: 'abc'"
    - case:
        id: "error_stack_remainder_three"
        input: ["10", "5", "2"]
        raises: ValueError
        match: "Invalid expression: 3 values remaining on stack"
    - case:
        id: "error_op_no_operands"
        input: ["+"]
        raises: ValueError
        match: "Not enough operands for '\\+'"
    - case:
        id: "error_invalid_float_string"
        input: ["10", "2.0", "/"]
        raises: ValueError
        match: "Invalid token: '2.0'"
    - case:
        id: "error_stack_remainder_two"
        input: ["1", "2", "-", "3"]
        raises: ValueError
        match: "Invalid expression: 2 values remaining on stack"
    - case:
        id: "error_stack_remainder_complex"
        input: ["2", "3", "4", "5", "*"]
        raises: ValueError
        match: "Invalid expression: 3 values remaining on stack"
    - case:
        id: "error_malformed_operator"
        input: ["2", "3", "- -"]
        raises: ValueError
        match: "Invalid token: '- -'"
    - case:
        id: "error_invalid_token_none"
        input: ["None"]
        raises: ValueError
        match: "Invalid token: 'None'"
