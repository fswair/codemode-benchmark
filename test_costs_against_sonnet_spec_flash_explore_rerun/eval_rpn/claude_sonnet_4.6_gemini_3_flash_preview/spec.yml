eval_rpn:
  evals:
    ReturnType:
      type: int
    FastEnough:
      duration: 1.0

  dataset:
    # --- Typical / happy path cases ---
    - case:
        id: addition_and_multiplication
        input: ["2", "1", "+", "3", "*"]
        expected: 9

    - case:
        id: division_truncation_and_addition
        input: ["4", "13", "5", "/", "+"]
        expected: 6

    - case:
        id: complex_nested_expression
        input: ["10", "6", "9", "3", "+", "-11", "*", "/", "*", "17", "+", "5", "+"]
        expected: 22

    - case:
        id: single_operand
        input: ["42"]
        expected: 42

    - case:
        id: single_negative_operand
        input: ["-1"]
        expected: -1

    - case:
        id: simple_positive_division_truncation
        input: ["10", "3", "/"]
        expected: 3

    - case:
        id: negative_numerator_division_truncation
        input: ["-10", "3", "/"]
        expected: -3

    - case:
        id: negative_denominator_division_truncation
        input: ["10", "-3", "/"]
        expected: -3

    - case:
        id: zero_divided_by_number
        input: ["0", "5", "/"]
        expected: 0

    - case:
        id: operations_involving_zero_subtraction_multiply
        input: ["5", "0", "-", "3", "*"]
        expected: 15

    - case:
        id: multiply_two_negatives
        input: ["-5", "-2", "*"]
        expected: 10

    - case:
        id: subtraction_positive_result
        input: ["100", "50", "-"]
        expected: 50

    - case:
        id: subtraction_negative_result
        input: ["50", "100", "-"]
        expected: -50

    - case:
        id: chain_of_additions
        input: ["1", "2", "+", "3", "+", "4", "+"]
        expected: 10

    - case:
        id: order_of_ops_add_then_mul
        input: ["2", "3", "4", "*", "+"]
        expected: 14

    - case:
        id: order_of_ops_mul_then_add
        input: ["3", "4", "*", "2", "+"]
        expected: 14

    - case:
        id: division_result_as_operand
        input: ["10", "2", "/", "5", "*"]
        expected: 25

    - case:
        id: truncated_division_then_multiply
        input: ["5", "2", "/", "2", "*"]
        expected: 4

    - case:
        id: all_four_operators
        input: ["1", "2", "+", "3", "-", "4", "*", "5", "/"]
        expected: 0

    - case:
        id: large_integer_multiplication
        input: ["1000000", "1000000", "*"]
        expected: 1000000000000

    - case:
        id: zero_minus_zero
        input: ["0", "0", "-"]
        expected: 0

    - case:
        id: two_negatives_division_truncation
        input: ["-10", "-3", "/"]
        expected: 3

    - case:
        id: negative_num_smaller_than_denom_truncates_to_zero
        input: ["-1", "2", "/"]
        expected: 0

    - case:
        id: positive_smaller_than_negative_denom_truncates_to_zero
        input: ["1", "-2", "/"]
        expected: 0

    - case:
        id: multiply_by_zero
        input: ["0", "10", "*"]
        expected: 0

    - case:
        id: divide_by_one
        input: ["5", "1", "/"]
        expected: 5

    - case:
        id: divide_by_negative_one
        input: ["5", "-1", "/"]
        expected: -5

    - case:
        id: zero_divided_by_negative
        input: ["0", "-5", "/"]
        expected: 0

    # --- Property / assertion based cases ---
    - case:
        id: result_is_non_negative_for_positive_mul
        input: ["3", "7", "*"]
        assertion: "output > 0"

    - case:
        id: subtraction_commutativity_check
        input: ["8", "3", "-"]
        assertion: "output == 5"

    - case:
        id: addition_commutativity_via_assertion
        input: ["6", "4", "+"]
        assertion: "output == 10"

    # --- Error / raises cases (exactly 11) ---
    - case:
        id: empty_expression_raises_value_error
        input: []
        raises: ValueError
        match: "Empty expression"

    - case:
        id: not_enough_operands_single_operand_plus
        input: ["1", "+"]
        raises: ValueError
        match: "Not enough operands"

    - case:
        id: division_by_zero_raises
        input: ["1", "2", "0", "/"]
        raises: ZeroDivisionError

    - case:
        id: invalid_token_alphabetic
        input: ["abc"]
        raises: ValueError
        match: "Invalid token"

    - case:
        id: too_many_values_on_stack_two_operands
        input: ["1", "2"]
        raises: ValueError
        match: "Invalid expression"

    - case:
        id: operator_at_start_no_operands
        input: ["+", "1", "2"]
        raises: ValueError
        match: "Not enough operands"

    - case:
        id: complex_expression_two_values_remaining
        input: ["10", "2", "3", "4", "-", "*"]
        raises: ValueError
        match: "Invalid expression"

    - case:
        id: invalid_token_float_string
        input: ["1.5", "1", "+"]
        raises: ValueError
        match: "Invalid token"

    - case:
        id: invalid_token_whitespace_as_first
        input: [" ", "1", "+"]
        raises: ValueError
        match: "Invalid token"

    - case:
        id: three_operands_only_one_operator_leaves_two
        input: ["1", "2", "3", "+"]
        raises: ValueError
        match: "Invalid expression"

    - case:
        id: invalid_token_trailing_space_string
        input: ["1", "2", " "]
        raises: ValueError
        match: "Invalid token"
