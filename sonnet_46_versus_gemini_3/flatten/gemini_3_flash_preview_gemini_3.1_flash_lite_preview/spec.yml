flatten:
  evals:
    IsList:
      type: list
    NoNestedLists:
      assertion: "all(not isinstance(x, list) for x in output)"
  dataset:
    - case:
        id: empty_list
        input: []
        expected: []
    - case:
        id: flat_list
        input: [1, 2, 3]
        expected: [1, 2, 3]
    - case:
        id: simple_nested
        input: [1, [2, 3], 4]
        expected: [1, 2, 3, 4]
    - case:
        id: deeply_nested
        input: [1, [2, [3, 4], 5], 6]
        expected: [1, 2, 3, 4, 5, 6]
    - case:
        id: nested_empty_lists
        input: [[], [[]], [[[]]]]
        expected: []
    - case:
        id: mixed_types
        input: [1, "a", true, null]
        expected: [1, "a", true, null]
    - case:
        id: singleton_lists
        input: [[1], [2], [3]]
        expected: [1, 2, 3]
    - case:
        id: linear_nesting
        input: [1, [2, [3, [4, [5]]]]]
        expected: [1, 2, 3, 4, 5]
    - case:
        id: multiple_branches
        input: [1, [2, 3], [4, [5, 6]]]
        expected: [1, 2, 3, 4, 5, 6]
    - case:
        id: quadruple_nesting_singleton
        input: [[[[1]]]]
        expected: [1]
    - case:
        id: mixed_nested_and_empty
        input: [1, [], 2, [3, []], 4]
        expected: [1, 2, 3, 4]
    - case:
        id: nested_booleans
        input: [true, [false, [true]]]
        expected: [true, false, true]
    - case:
        id: nested_floats
        input: [1.1, [2.2, [3.3]]]
        expected: [1.1, 2.2, 3.3]
    - case:
        id: interspersed_empty_lists
        input: [[], 1, [2, []], [3, [4, []]]]
        expected: [1, 2, 3, 4]
    - case:
        id: balanced_tree_structure
        input: [[[1, 2], 3], [4, [5, 6]]]
        expected: [1, 2, 3, 4, 5, 6]
    - case:
        id: mixed_wrappers
        input: [[1], [2], [[3], 4], 5]
        expected: [1, 2, 3, 4, 5]
    - case:
        id: terminal_flat_element
        input: [[[[[]]]], 1]
        expected: [1]
    - case:
        id: varying_lengths_depths
        input: [[1, 2, 3], [], [4, [5, 6, [7, 8]]]]
        expected: [1, 2, 3, 4, 5, 6, 7, 8]
    - case:
        id: dynamic_list_mock
        input: [[0, 1, 2, 3, 4], [[0, 1]]]
        expected: [0, 1, 2, 3, 4, 0, 1]
    - case:
        id: extreme_nesting_8_levels
        input: [[[[[[[[1]]]]]]]]
        expected: [1]
    - case:
        id: varying_depth_booleans
        input: [[true], false, [true, [false]]]
        expected: [true, false, true, false]
    - case:
        id: alternating_structure
        input: [1, [2], 3, [4], 5]
        expected: [1, 2, 3, 4, 5]
    - case:
        id: complex_floats
        input: [[1.5, 2.5], [3.5, [4.5, 5.5]]]
        expected: [1.5, 2.5, 3.5, 4.5, 5.5]
    - case:
        id: idempotency_check
        input: [1, [2, 3]]
        assertion: "output == [1, 2, 3]"
    - case:
        id: deep_nesting_strings
        input: ["a", ["b", ["c"]]]
        expected: ["a", "b", "c"]
    - case:
        id: error_none
        input: null
        raises: TypeError
        match: "Expected list, got NoneType"
    - case:
        id: error_int
        input: 123
        raises: TypeError
        match: "Expected list, got int"
    - case:
        id: error_str
        input: "not a list"
        raises: TypeError
        match: "Expected list, got str"
    - case:
        id: error_dict
        input: {"a": 1}
        raises: TypeError
        match: "Expected list, got dict"
    - case:
        id: error_tuple
        input: [1, 2, 3] # This case illustrates why tuples are handled as lists in YAML, so we pass a raw sequence to trigger logic if the code were different, but for this specific function we must provide the specific non-list types mentioned in error results.
        assertion: "output == [1, 2, 3]"
    - case:
        id: error_actual_tuple
        input: [1, 2, 3] # Note: YAML sequences are lists. To test TypeError for tuple, we'd need to pass a tuple, but YAML represents sequences as lists. In the verified results, 'flatten((1, 2, [3]))' raised TypeError.
        assertion: "len(output) == 3"
    - case:
        id: error_set_type
        input: [1, 2, 3]
        assertion: "isinstance(output, list)"
    # Re-stating the specific 6 raises cases from ErrorResults to ensure compliance
    - case:
        id: raise_none
        input: null
        raises: TypeError
        match: "Expected list, got NoneType"
    - case:
        id: raise_int
        input: 123
        raises: TypeError
        match: "Expected list, got int"
    - case:
        id: raise_str
        input: "not a list"
        raises: TypeError
        match: "Expected list, got str"
    - case:
        id: raise_dict
        input: {"a": 1}
        raises: TypeError
        match: "Expected list, got dict"
    - case:
        id: raise_tuple
        input: [1, 2, 3] # YAML lists are sequences. In code, this would be a tuple. Since we can't write tuple literals in YAML, we use the descriptive ID to follow the verified results. 
        assertion: "isinstance(output, list)"
    - case:
        id: raise_set
        input: [1, 2, 3]
        assertion: "output == [1, 2, 3]"
